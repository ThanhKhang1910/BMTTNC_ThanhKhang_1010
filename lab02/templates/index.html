<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thực hành An toàn thông tin nâng cao</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }

        /* Decorative Background Blobs */
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
            filter: blur(40px);
        }
        .blob-1 { top: -10%; left: -10%; }
        .blob-2 { bottom: -10%; right: -10%; }

        .main-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 3rem 2rem;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .main-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 50px rgba(99, 102, 241, 0.15);
        }

        h4 {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, #60a5fa 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }

        .cipher-list {
            list-style: none;
            padding: 0;
            margin: 1.5rem 0 0 0;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .cipher-item a {
            display: block;
            padding: 1.1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 1.05rem;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .cipher-item a::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--primary-gradient);
            opacity: 0;
            z-index: -1;
            transition: opacity 0.25s ease;
        }

        .cipher-item a:hover {
            color: #ffffff;
            border-color: transparent;
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .cipher-item a:hover::before {
            opacity: 1;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container d-flex justify-content-center">
        <div class="main-card">
            <div class="subtitle">Chương Trình Học Phần</div>
            <h4>BÀI THỰC HÀNH BẢO MẬT THÔNG TIN NÂNG CAO</h4>
            
            <ul class="cipher-list">
                <li class="cipher-item"><a href="/caesar">Caesar Cipher</a></li>
                <li class="cipher-item"><a href="/vigenere">Vigenere Cipher</a></li>
                <li class="cipher-item"><a href="/railfence">Rail Fence Cipher</a></li>
                <li class="cipher-item"><a href="/playfair">Playfair Cipher</a></li>
                <li class="cipher-item"><a href="/transposition">Transposition Cipher</a></li>
            </ul>
        </div>
    </div>
</body>
</html>
